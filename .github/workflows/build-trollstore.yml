name: Build Unsigned IPA cho TrollStore

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cài đặt & Build Giao diện & Đồng bộ
        run: |
          npm install
          npm run build
          npx cap sync ios

      - name: Build file .app (Ép Unsigned)
        run: |
          cd ios/App
          # Đổi từ -workspace sang -project để khớp với cấu trúc thư mục của bạn
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -derivedDataPath derived_data CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv ios/App/derived_data/Build/Products/Release-iphoneos/App.app Payload/
          zip -r OpenClaw.ipa Payload

      - name: Trả kết quả file IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-TrollStore
          path: OpenClaw.ipa
