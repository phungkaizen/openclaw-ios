<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover là bắt buộc để tràn màn hình qua tai thỏ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>OpenClaw Intelligence</title>
  <style>
    :root {
      --apple-blue: #007AFF;
      --system-bg: #F2F2F7;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
    }

    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: var(--system-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      overflow: hidden; /* Chặn scroll trang chính để tránh xung đột với iframe */
    }

    /* Header Apple: Kính mờ (Blur) */
    .header {
      position: fixed;
      top: 0; width: 100%;
      /* Tự động đẩy xuống dưới tai thỏ */
      padding-top: env(safe-area-inset-top); 
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      z-index: 100;
    }

    .header-content {
      height: 44px; /* Chiều cao chuẩn iOS */
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 17px;
      color: #000;
      letter-spacing: -0.4px;
    }

    /* Container bao quanh Iframe */
    .web-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Đẩy nội dung né Header và Home Bar */
      padding-top: calc(44px + env(safe-area-inset-top));
      padding-bottom: env(safe-area-inset-bottom);
      
      /* Giúp vuốt mượt trên iOS */
      -webkit-overflow-scrolling: touch;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      display: block;
      /* Bo góc nhẹ để giao diện trông hiện đại */
      border-radius: 18px 18px 0 0;
    }

    /* Footer che phần thanh gạch ngang dưới cùng */
    .footer-bar {
      position: fixed;
      bottom: 0; width: 100%;
      height: env(safe-area-inset-bottom);
      background: #ffffff;
      z-index: 100;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-content">
      <span> OpenClaw Intelligence</span>
    </div>
  </header>

  <main class="web-container">
    <!-- Link VPS OpenClaw của bạn -->
    <iframe 
      src="https://tom.aitudong.click" 
      id="main-frame"
      allow="clipboard-read; clipboard-write; microphone; camera"
    ></iframe>
  </main>

  <div class="footer-bar"></div>

  <!-- Xử lý lỗi nếu không load được trang -->
  <script>
    const iframe = document.getElementById('main-frame');
    
    // Nếu sau 10 giây vẫn trắng trang, hiện thông báo cho người dùng
    setTimeout(() => {
      try {
        if (iframe.contentWindow.length === 0) {
          console.log("Iframe có vẻ chưa load được nội dung.");
        }
      } catch (e) {
        // Lỗi này thường xảy ra do bảo mật, nhưng là dấu hiệu iframe đã load link ngoài
      }
    }, 10000);
  </script>

</body>
</html>
