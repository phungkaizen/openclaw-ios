<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <!-- CỰC KỲ QUAN TRỌNG: viewport-fit=cover để tràn màn hình qua tai thỏ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>OpenClaw Pro - Apple Intelligence Edition</title>
  <style>
    :root {
      --apple-blue: #007AFF;
      --system-bg: #F2F2F7;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
    }

    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: var(--system-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      overflow: hidden; /* Không cho scroll cả trang chính để tránh bị văng */
    }

    /* Header phong cách Apple: Kính mờ (Blur) */
    .header {
      position: fixed;
      top: 0; width: 100%;
      /* Xử lý tai thỏ bằng Safe Area Inset */
      padding-top: env(safe-area-inset-top); 
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      z-index: 100;
      text-align: center;
    }

    .header-content {
      height: 44px; /* Độ cao chuẩn của thanh Header iOS */
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 17px;
      color: #000;
      letter-spacing: -0.4px;
    }

    /* Khung chứa nội dung OpenClaw */
    .web-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Đẩy nội dung xuống dưới Header và lên trên Home Bar */
      padding-top: calc(44px + env(safe-area-inset-top));
      padding-bottom: env(safe-area-inset-bottom);
      
      /* GIÚP CUỘN MƯỢT NHƯ APP GỐC */
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      /* Bo góc nhẹ cho phần web nhìn cho xịn xò */
      border-radius: 20px 20px 0 0; 
      background: white;
      display: block; /* Đảm bảo không bị khoảng trắng dư thừa */
    }

    /* Thanh trạng thái nhỏ dưới cùng (Home Bar area) */
    .footer-bar {
      position: fixed;
      bottom: 0; width: 100%;
      height: env(safe-area-inset-bottom);
      background: white;
      z-index: 100;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-content">
      <span> OpenClaw Intelligence</span>
    </div>
  </header>

  <main class="web-container">
    <!-- Nhúng giao diện Websocket gốc của bạn vào đây -->
    <iframe 
      src="http://207.148.113.141:18789" 
      allow="clipboard-read; clipboard-write"
      id="openclaw-frame">
    </iframe>
  </main>

  <div class="footer-bar"></div>

  <!-- Tự động ẩn Splash Screen khi web sẵn sàng -->
  <script type="module">
    window.addEventListener('load', () => {
      // Đợi 1s cho mượt rồi ẩn loading (nếu có plugin splash)
      if (window.Capacitor) {
        window.Capacitor.Plugins.SplashScreen.hide();
      }
    });
  </script>

</body>
</html>
