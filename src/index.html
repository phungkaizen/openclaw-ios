<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Chat</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
    #chatBox { height: 400px; background: white; border-radius: 8px; overflow-y: auto; margin-bottom: 15px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .input-group { display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
    button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🤖 Trợ lý OpenClaw</h2>
  <div id="chatBox"></div>
  <div class="input-group">
    <input type="text" id="userInput" placeholder="Nhập tin nhắn của bạn...">
    <button id="chatBtn">Gửi</button>
  </div>

  <script>
    const btn = document.getElementById('chatBtn');
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('userInput');

    // 🔴 QUAN TRỌNG: ĐIỀN IP VÀ PORT VPS CỦA BẠN VÀO ĐÂY
    // Ví dụ: 'http://103.xxx.xx.xx:8000/v1/chat/completions'
    const OPENCLAW_API_URL = 'http://207.148.113.141:18789/v1/chat/completions'; 

    btn.addEventListener('click', async () => {
        const text = input.value;
        if (!text) return;
        
        chatBox.innerHTML += `<div style="margin-bottom:10px;"><b>🧑 Bạn:</b> ${text}</div>`;
        input.value = '';
        chatBox.innerHTML += `<div id="loading" style="color: gray;"><i>Đang suy nghĩ...</i></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(OPENCLAW_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "openclaw", // Thay đổi tên model nếu VPS của bạn cấu hình khác
                    messages: [{ role: "user", content: text }]
                })
            });
            
            const data = await response.json();
            document.getElementById('loading').remove();
            
            // Lấy câu trả lời (Đa số các AI tự host hiện nay đều dùng chuẩn cấu trúc giống OpenAI)
            const reply = data.choices[0].message.content; 
            chatBox.innerHTML += `<div style="margin-bottom:10px; color: #0056b3;"><b>🤖 OpenClaw:</b> ${reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            
        } catch (error) {
            document.getElementById('loading').remove();
            chatBox.innerHTML += `<div style="color: red; margin-bottom:10px;"><b>⚠️ Lỗi kết nối:</b> Không thể gọi tới VPS. Kiểm tra lại IP hoặc mạng.</div>`;
        }
    });
  </script>
</body>
</html>
